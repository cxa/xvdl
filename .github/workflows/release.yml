name: Release macOS build

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v260430.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-15
    timeout-minutes: 45

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
      DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
      DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}

    steps:
      - name: Resolve release tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if ! [[ "$RELEASE_TAG" =~ ^v[0-9]{6}\.[0-9]+$ ]]; then
            echo "::error::Release tag must use yymmdd.patch format, for example v260430.0; got $RELEASE_TAG"
            exit 1
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate version and extension
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "v$PACKAGE_VERSION" != "$RELEASE_TAG" ]; then
            echo "::error::package.json version $PACKAGE_VERSION does not match release tag $RELEASE_TAG"
            exit 1
          fi

          npm run validate

      - name: Import Developer ID certificate
        env:
          KEYCHAIN_PASSWORD: ${{ runner.temp }}-${{ github.run_id }}
        run: |
          set -euo pipefail

          for name in APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD DEVELOPER_ID_CERTIFICATE_BASE64 DEVELOPER_ID_CERTIFICATE_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: $name"
              exit 1
            fi
          done

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/xvdl-signing.keychain-db"

          printf "%s" "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Generate macOS Safari wrapper
        run: npm run package:safari

      - name: Build signed Release app
        run: |
          set -euo pipefail
          SIGNING_IDENTITY="${DEVELOPER_ID_APPLICATION:-Developer ID Application}"

          xcodebuild \
            -project Safari/XVDL/XVDL.xcodeproj \
            -scheme XVDL \
            -configuration Release \
            -derivedDataPath build/ReleaseDerivedData \
            -destination "platform=macOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            build

          APP_PATH="$PWD/build/ReleaseDerivedData/Build/Products/Release/XVDL.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Expected app not found at $APP_PATH"
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          for SIGNED_BUNDLE in "$APP_PATH" "$APP_PATH/Contents/PlugIns/XVDL Extension.appex"; do
            ENTITLEMENTS="$(codesign -d --entitlements :- "$SIGNED_BUNDLE" 2>/dev/null || true)"
            if printf "%s" "$ENTITLEMENTS" | grep -q "com.apple.security.get-task-allow"; then
              echo "::error::$SIGNED_BUNDLE includes com.apple.security.get-task-allow, which cannot be notarized"
              exit 1
            fi
          done

          EXTENSION_ENTITLEMENTS="$(codesign -d --entitlements :- "$APP_PATH/Contents/PlugIns/XVDL Extension.appex" 2>/dev/null || true)"
          for REQUIRED_ENTITLEMENT in "com.apple.security.network.client" "com.apple.security.files.downloads.read-write"; do
            if ! printf "%s" "$EXTENSION_ENTITLEMENTS" | grep -q "$REQUIRED_ENTITLEMENT"; then
              echo "::error::XVDL Extension is missing $REQUIRED_ENTITLEMENT"
              exit 1
            fi
          done

      - name: Notarize and staple
        run: |
          set -euo pipefail
          NOTARY_ZIP="$PWD/build/XVDL-${RELEASE_VERSION}-notary.zip"
          FINAL_ZIP="$PWD/build/XVDL-${RELEASE_VERSION}-macos.zip"
          CHECKSUM_FILE="$PWD/build/XVDL-${RELEASE_VERSION}-macos.sha256"
          NOTARY_JSON="$PWD/build/notary-submit.json"

          ditto -c -k --keepParent "$APP_PATH" "$NOTARY_ZIP"

          set +e
          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait \
            --output-format json > "$NOTARY_JSON"
          NOTARY_STATUS=$?
          set -e

          cat "$NOTARY_JSON"
          SUBMISSION_ID="$(python3 -c 'import json, sys; print((json.load(open(sys.argv[1])).get("id") or ""))' "$NOTARY_JSON")"
          if [ -n "$SUBMISSION_ID" ]; then
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
          fi

          if [ "$NOTARY_STATUS" -ne 0 ]; then
            exit "$NOTARY_STATUS"
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

          ditto -c -k --keepParent "$APP_PATH" "$FINAL_ZIP"
          (cd "$(dirname "$FINAL_ZIP")" && shasum -a 256 "$(basename "$FINAL_ZIP")") > "$CHECKSUM_FILE"

          echo "FINAL_ZIP=$FINAL_ZIP" >> "$GITHUB_ENV"
          echo "CHECKSUM_FILE=$CHECKSUM_FILE" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_NOTES="$PWD/RELEASE_NOTES.md"
          if [ ! -s "$RELEASE_NOTES" ]; then
            echo "::error::RELEASE_NOTES.md is missing or empty"
            exit 1
          fi
          GITHUB_RELEASE_NOTES="$RUNNER_TEMP/release-notes.md"
          awk 'NR == 1 && /^# / { skip_blank = 1; next } skip_blank && /^$/ { skip_blank = 0; next } { skip_blank = 0; print }' "$RELEASE_NOTES" > "$GITHUB_RELEASE_NOTES"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --notes-file "$GITHUB_RELEASE_NOTES"
            gh release upload "$RELEASE_TAG" "$FINAL_ZIP" "$CHECKSUM_FILE" --clobber
          else
            gh release create "$RELEASE_TAG" "$FINAL_ZIP" "$CHECKSUM_FILE" \
              --title "XVDL $RELEASE_TAG" \
              --notes-file "$GITHUB_RELEASE_NOTES"
          fi
